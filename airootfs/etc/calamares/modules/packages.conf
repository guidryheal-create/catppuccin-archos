# Pacman backend — netinstall populates install lists via Global Storage.
---
backend: pacman

skip_if_no_internet: false
# Avoid full DB refresh on unsquash-derived roots (ALCI-style); netinstall still works when online.
update_db: false
update_system: false

pacman:
  num_retries: 2
  disable_download_timeout: false
  needed_only: true

operations: []
