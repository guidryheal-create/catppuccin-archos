---
showSupportUrl: false
showKnownIssuesUrl: false
showReleaseNotesUrl: false
showDonateUrl: false

requirements:
  requiredStorage: 4.0
  requiredRam: 1.0
  # Empty: do not probe the internet on Welcome (installer should open offline; Wi‑Fi can be set up after).
  internetCheckUrl: ""
  check:
    - storage
    - ram
  required:
    - ram

geoip:
  style: "none"
  url: "https://geoip.kde.org/v1/ubiquity"
  selector: "CountryCode"
