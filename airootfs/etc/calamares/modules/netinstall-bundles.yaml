# Optional pacman bundles for the installed system (see netinstall-bundles.conf).
# Theme ideas: https://catppuccin.com/ports/   App bundles: https://flathub.org/en
# Security inspiration (curated for Arch repos): https://github.com/sbilly/awesome-security
# GPU: live ISO ships Mesa for AMD/Intel; pick NVIDIA only if `lspci | grep -i nvidia` matches.
---
groups:
  - name: "Development"
    description: "Compilers, headers, debug tools, and KDE editors."
    selected: false
    expanded: true
    packages:
      - base-devel
      - git
      - gdb
      - perf
      - strace
      - sparse
      - bison
      - flex
      - pahole
      - bc
      - linux-headers
      - ark
      - kate

  - name: "Trader and productivity"
    description: "CLI productivity tools (bat, ripgrep, …)."
    selected: false
    packages:
      - bat
      - eza
      - ripgrep
      - fd
      - fzf
      - zoxide

  - name: "Security and privacy"
    description: "Baseline desktop security — firewall (firewalld), AppArmor, Tor, ClamAV, Lynis. ClamAV needs a large DB on first freshclam."
    selected: false
    packages:
      - tor
      - torsocks
      - lynis
      - apparmor
      - firewalld
      - clamav

  - name: "Security — extended hardening"
    description: "Extra tools in Arch repos aligned with awesome-security themes (audit, integrity, scanning, sandbox). Do not run ufw alongside firewalld — use the privacy bundle above for firewalld, or skip it if you prefer another firewall manually."
    selected: false
    expanded: false
    packages:
      - arch-audit
      - audit
      - aide
      - chkrootkit
      - rkhunter
      - fail2ban
      - wireshark-cli
      - trivy
      - firejail

  - name: "Monitoring"
    description: "System and GPU monitoring TUI tools."
    selected: false
    packages:
      - btop
      - iotop
      - iftop
      - glances
      - nvtop

  - name: "Office"
    description: "LibreOffice suite."
    selected: false
    packages:
      - libreoffice-fresh

  - name: "Theming extras"
    description: "Extra GTK theming from official repos (Qt theming via Kvantum is available on the image; Catppuccin assets depend on the ISO build settings)."
    selected: false
    packages:
      - arc-gtk-theme

  - name: "GPU drivers — NVIDIA"
    description: "Proprietary NVIDIA stack. Use only with an NVIDIA GPU; leave unchecked for AMD/Intel (Mesa is included by default)."
    selected: false
    critical: false
    packages:
      - nvidia-open
      - nvidia-utils
      - nvidia-settings
