# Curated, low-friction paths for a Catppuccin-style desktop.
# Full port index (455+): https://catppuccin.com/ports/
# Many ports are build-from-source or editor-specific; this file stays minimal.
---
hubs:
  catppuccin_ports: "https://catppuccin.com/ports/"
  flathub: "https://flathub.org/en"
  awesome_security: "https://github.com/sbilly/awesome-security"

# Pacman ideas mapped from awesome-security categories (only what is in official repos).
# Full list is huge; Calamares installs the “Security — extended hardening” group in netinstall-bundles.yaml.
awesome_security_arch_repo:
  endpoint_hardening:
    note: "Anti-malware, integrity, rootkit checks (see Endpoint in awesome-security)."
    packages:
      - clamav
      - aide
      - chkrootkit
      - rkhunter
  auditing_and_compliance:
    note: "Linux audit subsystem, Lynis audits, Arch CVE checker."
    packages:
      - audit
      - lynis
      - arch-audit
  firewall_and_bruteforce:
    note: "firewalld (with Security and privacy bundle); fail2ban for SSH/services."
    packages:
      - firewalld
      - fail2ban
  network_forensics:
    note: "Packet capture / analysis (Monitoring bundle adds btop; wireshark-cli here)."
    packages:
      - wireshark-cli
  devops_security:
    note: "Container/image scanning (DevOps section in awesome-security)."
    packages:
      - trivy
  sandboxing:
    note: "Optional per-app sandbox (Usability/endpoint themes)."
    packages:
      - firejail

# Grouped by theme — “easy” = repo, Flathub, or already on the live image.
catppuccin_ports_by_category:
  qt_and_kde:
    note: "Kvantum + qt5ct/qt6ct are available; Catppuccin Kvantum theme assets may be bundled into the ISO depending on build settings."
    repo_examples:
      - kvantum
      - qt5ct
      - qt6ct
  gtk:
    note: "GTK Catppuccin often via AUR or manual; extra repo theme on installer: arc-gtk-theme."
    repo_examples:
      - arc-gtk-theme
  icons:
    note: "Papirus + Papirus-Dark pair well; on ISO: papirus-icon-theme."
    repo_examples:
      - papirus-icon-theme
  shell_prompt:
    note: "Starship Catppuccin preset; on ISO: starship, fastfetch."
    repo_examples:
      - starship
  terminals:
    note: "Konsole on ISO; Kitty/WezTerm ports listed on Catppuccin site — often AUR or upstream install."
    flathub_examples: []
  browsers:
    flathub:
      - com.brave.Browser
  editors_ide:
    flathub:
      - com.visualstudio.code
  games_and_tools:
    flathub:
      - com.valvesoftware.Steam
      - com.github.tchx84.Flatseal
      - com.daidouji.oneko

# Same IDs as Calamares packagechooser / kitest-desktop-extras (keep in sync).
flathub_quick_picks:
  browser: "com.brave.Browser"
  gaming: "com.valvesoftware.Steam"
  flatpak_management: "com.github.tchx84.Flatseal"
  fun: "com.daidouji.oneko"
