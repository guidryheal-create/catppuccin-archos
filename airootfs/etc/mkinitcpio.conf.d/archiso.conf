# Explicit VM support: keep virtio storage/net/gpu available in early userspace.
# This avoids Plasma black/blank UI when virtio modules are not pulled in by default.
MODULES=(virtio virtio_pci virtio_blk virtio_scsi virtio_net virtio_gpu virtio_console)

# autodetect trims unrelated modules while keeping required ones for the current build environment.
# With MODULES=() above, virtio stays included even if autodetect wouldn’t pick it.
HOOKS=(base udev autodetect microcode modconf kms memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
