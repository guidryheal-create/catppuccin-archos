# Extra bind mounts for the target chroot (ALCI-derived; btrfs optional below).
---
extraMounts:
  - device: proc
    fs: proc
    mountPoint: /proc
  - device: sys
    fs: sysfs
    mountPoint: /sys
  - device: /dev
    mountPoint: /dev
    options: [ bind ]
  - device: tmpfs
    fs: tmpfs
    mountPoint: /run
  - device: /run/udev
    mountPoint: /run/udev
    options: [ bind ]
  - device: efivarfs
    fs: efivarfs
    mountPoint: /sys/firmware/efi/efivars
    efi: true

mountOptions:
  - filesystem: default
    options: [ defaults, noatime ]
  - filesystem: efi
    options: [ defaults, umask=0077 ]
  - filesystem: btrfs
    options: [ defaults, noatime, compress=zstd ]
