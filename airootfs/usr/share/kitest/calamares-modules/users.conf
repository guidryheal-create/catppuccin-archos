---
defaultGroups:
  - name: users
    must_exist: true
    system: true
  - lp
  - video
  - network
  - storage
  - name: wheel
    must_exist: false
    system: true
  - audio

sudoersGroup: wheel
autologinGroup: autologin
sudoersConfigureWithGroup: false
