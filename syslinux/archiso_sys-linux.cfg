LABEL arch
TEXT HELP
Kitest OS live session (Plasma). Log in at SDDM, then run Calamares from the desktop
to install, or use the live system without installing.
ENDTEXT
MENU LABEL Kitest OS - ^live session (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Accessibility boot option
LABEL archspeech
TEXT HELP
Same as the live session, with speakup screen reader enabled.
ENDTEXT
MENU LABEL Kitest OS - live session (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on

# Writable overlay on an auto-detected writable partition (label fallback: KITEST_PERSIST).
LABEL archpersistent
TEXT HELP
Live session with overlay auto-detected on a writable partition.
Not the graphical installer: archinstall starts from the desktop after login like the
default live entry. Persistence does not change SDDM or Plasma.
ENDTEXT
MENU LABEL Kitest OS - persistent ^live (USB, %ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_autodetect=1 cow_label=KITEST_PERSIST cow_marker=/kitest-persist.marker
